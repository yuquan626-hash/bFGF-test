<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>科普知识答题</title>
    <style>
        :root {
            --bg: #F5F5F0;
            --card: #FFFFFF;
            --black: #1A1A1A;
            --gray: #9E9E9E;
            --gray-light: #E8E8E3;
            --yellow: #F5D547;
            --yellow-dark: #E8C83A;
            --pink: #E8B4D9;
            --pink-light: #F5E6EF;
            --green: #7BC8A4;
            --green-light: #E3F5EC;
            --green-dark: #5BAF85;
            --red: #E88B8B;
            --red-light: #FDE8E8;
            --blue: #A8C8E8;
            --blue-light: #E8F0F8;
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-pill: 50px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg);
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 24px 24px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            color: var(--black);
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border-radius: var(--radius-lg);
            padding: 32px 24px;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        /* 装饰性背景元素 */
        .container::before {
            content: '';
            position: absolute;
            top: -40px;
            right: -40px;
            width: 120px;
            height: 120px;
            background: var(--yellow);
            border-radius: 50%;
            opacity: 0.15;
        }

        .container::after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: -30px;
            width: 100px;
            height: 100px;
            background: var(--green);
            border-radius: 50%;
            opacity: 0.12;
        }

        /* ===== 欢迎页面 ===== */
        .welcome-screen {
            text-align: center;
            padding: 20px 0;
            position: relative;
            z-index: 1;
        }

        .welcome-icon {
            width: 80px;
            height: 80px;
            background: var(--yellow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
            box-shadow: 0 4px 15px rgba(245, 213, 71, 0.4);
        }

        .welcome-screen h2 {
            color: var(--black);
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            line-height: 1.3;
        }

        .welcome-screen p {
            color: var(--gray);
            font-size: 15px;
            margin-bottom: 36px;
            line-height: 1.7;
        }

        .welcome-tags {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 32px;
        }

        .welcome-tag {
            background: var(--black);
            color: white;
            padding: 6px 16px;
            border-radius: var(--radius-pill);
            font-size: 13px;
            font-weight: 500;
        }

        .welcome-tag:nth-child(2) {
            background: var(--pink);
            color: var(--black);
        }

        .welcome-tag:nth-child(3) {
            background: var(--green);
            color: var(--black);
        }

        /* ===== 按钮通用 ===== */
        .btn-primary {
            width: 100%;
            padding: 16px 24px;
            background: var(--yellow);
            color: var(--black);
            border: none;
            border-radius: var(--radius-pill);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(245, 213, 71, 0.35);
            letter-spacing: 0.5px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 213, 71, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary .arrow-circle {
            width: 28px;
            height: 28px;
            background: var(--black);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-primary .arrow-circle svg {
            width: 14px;
            height: 14px;
            fill: white;
        }

        /* ===== 答题页面 ===== */
        .header {
            text-align: center;
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--green-light);
            color: var(--green-dark);
            padding: 6px 14px;
            border-radius: var(--radius-pill);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 14px;
        }

        .header h1 {
            color: var(--black);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header .subtitle {
            color: var(--gray);
            font-size: 14px;
            font-weight: 400;
        }

        /* ===== 题目卡片 ===== */
        .question-box {
            background: var(--bg);
            border-radius: var(--radius-md);
            padding: 22px 20px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            border: 1.5px solid var(--gray-light);
        }

        .question-label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--black);
            color: white;
            padding: 4px 12px;
            border-radius: var(--radius-pill);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 14px;
        }

        .question-text {
            color: var(--black);
            font-size: 16px;
            line-height: 1.7;
            font-weight: 500;
        }

        /* ===== 选项 ===== */
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            z-index: 1;
        }

        .option {
            background: var(--card);
            border: 2px solid var(--gray-light);
            border-radius: var(--radius-md);
            padding: 14px 18px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            font-size: 14px;
            color: var(--black);
            position: relative;
        }

        .option:hover {
            border-color: var(--black);
            transform: translateX(4px);
        }

        .option:active {
            transform: scale(0.98);
        }

        .option.correct {
            border-color: var(--green);
            background: var(--green-light);
            color: var(--green-dark);
        }

        .option.wrong {
            border-color: var(--red);
            background: var(--red-light);
            color: #C0392B;
        }

        .option-letter {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg);
            border: 2px solid var(--gray-light);
            color: var(--black);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            margin-right: 14px;
            font-size: 13px;
            flex-shrink: 0;
            transition: all 0.25s ease;
        }

        .option:hover .option-letter {
            border-color: var(--black);
            background: var(--black);
            color: white;
        }

        .option.correct .option-letter {
            background: var(--green);
            border-color: var(--green);
            color: white;
        }

        .option.wrong .option-letter {
            background: var(--red);
            border-color: var(--red);
            color: white;
        }

        .option-text {
            line-height: 1.5;
            flex: 1;
        }

        /* ===== 反馈区域 ===== */
        .feedback {
            text-align: center;
            padding: 0;
            border-radius: var(--radius-md);
            margin-top: 20px;
            display: none;
            position: relative;
            z-index: 1;
        }

        .feedback.correct {
            display: block;
        }

        .feedback.wrong {
            display: block;
        }

        .feedback-card {
            border-radius: var(--radius-md);
            padding: 22px 20px;
        }

        .feedback.correct .feedback-card {
            background: var(--green-light);
            border: 2px solid var(--green);
        }

        .feedback.wrong .feedback-card {
            background: var(--red-light);
            border: 2px solid var(--red);
        }

        .feedback-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .feedback-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--black);
        }

        .feedback.correct .feedback-title {
            color: var(--green-dark);
        }

        .feedback.wrong .feedback-title {
            color: #C0392B;
        }

        .feedback-text {
            font-size: 14px;
            line-height: 1.5;
            color: #555;
        }

        /* ===== 科普框 ===== */
        .science-box {
            display: none;
            background: var(--blue-light);
            border: 2px solid var(--blue);
            border-radius: var(--radius-md);
            padding: 18px;
            margin-top: 14px;
            text-align: left;
            position: relative;
        }

        .science-box.show {
            display: block;
            animation: fadeInUp 0.4s ease;
        }

        .science-box-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .science-box-icon {
            width: 28px;
            height: 28px;
            background: var(--blue);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .science-box-title {
            color: var(--black);
            font-size: 14px;
            font-weight: 700;
        }

        .science-box-content {
            color: #444;
            font-size: 13px;
            line-height: 1.7;
        }

        .next-timer {
            font-size: 13px;
            color: var(--gray);
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .timer-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--gray);
            border-radius: 50%;
            animation: pulse 1s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* ===== 抽奖按钮 ===== */
        .lottery-btn {
            display: none;
            width: 100%;
            padding: 16px 24px;
            background: var(--yellow);
            color: var(--black);
            border: none;
            border-radius: var(--radius-pill);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.25s ease;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(245, 213, 71, 0.35);
            position: relative;
            z-index: 1;
            letter-spacing: 0.5px;
        }

        .lottery-btn.show {
            display: flex;
            animation: fadeInUp 0.4s ease;
        }

        .lottery-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 213, 71, 0.5);
        }

        .lottery-btn:active {
            transform: translateY(0);
        }

        .lottery-btn .arrow-circle {
            width: 28px;
            height: 28px;
            background: var(--black);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .lottery-btn .arrow-circle svg {
            width: 14px;
            height: 14px;
            fill: white;
        }

        /* ===== 动画 ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== 装饰元素 ===== */
        .deco {
            position: absolute;
            pointer-events: none;
            z-index: 0;
        }

        .deco-sparkle {
            color: var(--yellow);
            font-size: 14px;
            opacity: 0.5;
        }

        .deco-sparkle.top-right {
            top: 12px;
            right: 16px;
            font-size: 16px;
        }

        .deco-sparkle.bottom-left {
            bottom: 60px;
            left: 12px;
            color: var(--pink);
        }

        .deco-diamond {
            color: var(--green);
            font-size: 10px;
            opacity: 0.4;
        }

        .deco-diamond.top-left {
            top: 50px;
            left: 16px;
        }

        .deco-diamond.bottom-right {
            bottom: 30px;
            right: 20px;
            color: var(--yellow);
        }

        /* ===== 隐藏 ===== */
        .hidden {
            display: none !important;
        }

        /* ===== 响应式微调 ===== */
        @media (max-width: 360px) {
            .container {
                padding: 24px 18px;
            }
            .welcome-screen h2 {
                font-size: 22px;
            }
            .header h1 {
                font-size: 21px;
            }
            .question-text {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 装饰元素 -->
        <span class="deco deco-sparkle top-right">✦</span>
        <span class="deco deco-sparkle bottom-left">✦</span>
        <span class="deco deco-diamond top-left">◆</span>
        <span class="deco deco-diamond bottom-right">◆</span>

        <!-- 欢迎页面 -->
        <div id="welcomeScreen" class="welcome-screen">
            <div class="welcome-icon">🧬</div>
            <h2>欢迎参与<br>牛碱性成纤维细胞生长因子<br>科普知识答题</h2>
            <p>答题赢取精美礼品<br>答对题目即可参与抽奖活动</p>
            <div class="welcome-tags">
                <span class="welcome-tag">挑战脑力</span>
                <span class="welcome-tag">涨点知识</span>
                <span class="welcome-tag">解锁惊喜</span>
            </div>
            <button class="btn-primary" onclick="startQuiz()">
                开始答题
                <span class="arrow-circle">
                    <svg viewBox="0 0 24 24"><path d="M8 5l8 7-8 7z"/></svg>
                </span>
            </button>
        </div>

        <!-- 答题页面 -->
        <div id="quizScreen" class="hidden">
            <div class="header">
                <div class="header-badge">
                    <span>✦</span>
                    <span>科普知识问答</span>
                </div>
                <h1>请选择正确答案</h1>
                <div class="subtitle">答对可参与抽奖赢取礼品</div>
            </div>

            <div class="question-box">
                <div class="question-label">
                    <span>Q</span>
                    <span>单选题</span>
                </div>
                <div class="question-text" id="questionText">加载中...</div>
            </div>

            <div class="options" id="optionsContainer">
                <!-- 选项将通过JS动态生成 -->
            </div>

            <div class="feedback" id="feedback">
                <div class="feedback-card">
                    <div class="feedback-icon" id="feedbackIcon"></div>
                    <div class="feedback-title" id="feedbackTitle"></div>
                    <div class="feedback-text" id="feedbackText"></div>
                    <!-- 科普框 -->
                    <div class="science-box" id="scienceBox">
                        <div class="science-box-header">
                            <div class="science-box-icon">💡</div>
                            <div class="science-box-title">科普小知识</div>
                        </div>
                        <div class="science-box-content" id="scienceContent"></div>
                    </div>
                    <div class="next-timer" id="nextTimer">
                        <span class="timer-dot"></span>
                        <span id="timerText"></span>
                    </div>
                </div>
            </div>

            <button class="lottery-btn" id="lotteryBtn" onclick="goToLottery()">
                🎁 恭喜答对，请抽取精美礼品
                <span class="arrow-circle">
                    <svg viewBox="0 0 24 24"><path d="M8 5l8 7-8 7z"/></svg>
                </span>
            </button>
        </div>
    </div>

    <script>
        // 题目数据库
        const questions = [
            {
                id: 1,
                question: "牛碱性成纤维细胞生长因子凝胶（贝复新）没有冰箱冷藏还能用吗？",
                options: [
                    { letter: "A", text: "不能，要直接丢掉" },
                    { letter: "B", text: "短时间内，且存放在阴凉、干燥、避光的环境中可以" },
                    { letter: "C", text: "可以，不管什么环境下都能一直使用" }
                ],
                correct: "B",
                science: "根据牛碱性成纤维细胞生长因子凝胶的稳定性报告显示，在没有条件冷藏时，室温下、短时间内药物活性不会发生明显变化"
            },
            {
                id: 2,
                question: "若遵医嘱规范使用牛碱性成纤维细胞生长因子（贝复新/贝复济），会导致瘢痕增生吗？",
                options: [
                    { letter: "A", text: "一定会，因为生长因子会促进生长" },
                    { letter: "B", text: "不会，bFGF能改善胶原排序，减少增生性瘢痕形成" }
                ],
                correct: "B",
                science: "bFGF减少增生性疤痕形成的机制：通过抑制纤维母细胞向肌成纤维细胞转化，减少胶原过度沉积，调控细胞分泌的胶原蛋白排列，还可以通过促进MMP-1合成，分解过度增生的胶原"
            },
            {
                id: 3,
                question: "牛碱性成纤维细胞生长因子凝胶（贝复新）的哪一个是正确用法?",
                options: [
                    { letter: "A", text: "直接在流脓的伤口上涂抹" },
                    { letter: "B", text: "先涂抹贝复新再使用护肤品（如保湿霜）" },
                    { letter: "C", text: "伤口已经愈合的差不多了再使用" }
                ],
                correct: "B",
                science: "bFGF的作用机制是：通过与表面受体相结合，从而激活细胞通路调控细胞增殖与分化，因此需要直接作用于皮肤表面再使用其他护肤品。若伤口存在严重感染，应先清创伤口后再使用贝复新。贝复新的主要作用促进皮肤组织修复、加速创面愈合，因此最好在早期使用贝复新以达到最好的疗效。"
            }
        ];

        let currentQuestion = null;
        let answered = false;
        let questionPool = []; // 未出现过的题目索引池

        // 初始化题目池（洗牌算法）
        function initQuestionPool() {
            questionPool = questions.map((_, i) => i);
            // Fisher-Yates 洗牌
            for (let i = questionPool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questionPool[i], questionPool[j]] = [questionPool[j], questionPool[i]];
            }
        }

        // 开始答题
        function startQuiz() {
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            initQuestionPool();
            loadRandomQuestion();
        }

        // 加载随机题目（优先未出现过的）
        function loadRandomQuestion() {
            answered = false;

            // 如果题目池为空，重新洗牌
            if (questionPool.length === 0) {
                initQuestionPool();
            }

            // 从池中取出一个题目索引
            const randomIndex = questionPool.pop();
            currentQuestion = questions[randomIndex];

            document.getElementById('questionText').textContent = currentQuestion.question;

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            currentQuestion.options.forEach(option => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.onclick = () => selectOption(option.letter);
                optionDiv.innerHTML = `
                    <span class="option-letter">${option.letter}</span>
                    <span class="option-text">${option.text}</span>
                `;
                optionsContainer.appendChild(optionDiv);
            });

            document.getElementById('feedback').className = 'feedback';
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('lotteryBtn').classList.remove('show');
            document.getElementById('scienceBox').classList.remove('show');
        }

        // 选择选项
        function selectOption(letter) {
            if (answered) return;
            answered = true;

            const options = document.querySelectorAll('.option');
            const feedback = document.getElementById('feedback');
            const feedbackIcon = document.getElementById('feedbackIcon');
            const feedbackTitle = document.getElementById('feedbackTitle');
            const feedbackText = document.getElementById('feedbackText');
            const lotteryBtn = document.getElementById('lotteryBtn');
            const scienceBox = document.getElementById('scienceBox');
            const scienceContent = document.getElementById('scienceContent');

            options.forEach((option, index) => {
                const optionLetter = currentQuestion.options[index].letter;
                if (optionLetter === currentQuestion.correct) {
                    option.classList.add('correct');
                } else if (optionLetter === letter && letter !== currentQuestion.correct) {
                    option.classList.add('wrong');
                }
            });

            if (letter === currentQuestion.correct) {
                feedback.className = 'feedback correct';
                feedbackIcon.textContent = '🎉';
                feedbackTitle.textContent = '恭喜你，答对了！';
                feedbackText.textContent = '太棒了！你已经掌握了这个知识点。';
                // 答对也显示科普框
                scienceContent.textContent = currentQuestion.science;
                scienceBox.classList.add('show');
                // 答对后隐藏倒计时
                document.getElementById('nextTimer').style.display = 'none';
                lotteryBtn.classList.add('show');
            } else {
                feedback.className = 'feedback wrong';
                feedbackIcon.textContent = '😅';
                feedbackTitle.textContent = '很遗憾，答错了';
                // 显示完整正确答案选项文本
                const correctOption = currentQuestion.options.find(o => o.letter === currentQuestion.correct);
                feedbackText.innerHTML = `正确答案是 <strong>${currentQuestion.correct}. ${correctOption.text}</strong>`;
                
                scienceContent.textContent = currentQuestion.science;
                scienceBox.classList.add('show');
                
                // 答错时显示倒计时
                document.getElementById('nextTimer').style.display = 'flex';
                
                let countdown = 5;
                const timerText = document.getElementById('timerText');
                timerText.textContent = `${countdown}秒后自动进入下一题...`;
                
                const timer = setInterval(() => {
                    countdown--;
                    if (countdown > 0) {
                        timerText.textContent = `${countdown}秒后自动进入下一题...`;
                    } else {
                        clearInterval(timer);
                        loadRandomQuestion();
                    }
                }, 1000);
            }

            feedback.style.display = 'block';
        }

        // 跳转到抽奖页面
        function goToLottery() {
            window.location.href = 'https://15281842-235.hd.ysfaisco.cn/15281842/ks9cxVyjcpbOYNmrgTtpbw/load-15281842-235.html?style=75&editQrcode=true&_source=1';
        }

        document.addEventListener('DOMContentLoaded', function() {
            console.log('科普知识答题页面已加载');
        });
    </script>
